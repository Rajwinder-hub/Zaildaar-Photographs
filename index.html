<!DOCTYPE html>
<html>
<head>
<title>ZP | Zaildaar Photographs</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:white;
    font-family:Arial, sans-serif;
}

/* Navigation */
nav{
    position:fixed;
    top:0;
    width:100%;
    padding:18px 25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(10px);
    z-index:100;
}

.logo{
    font-size:42px;
    font-weight:bold;
    color:#FFD700;
    letter-spacing:6px;
    text-shadow:0 0 20px #FFD700;
    animation:glow 2s infinite alternate;
}

.name{
    font-size:15px;
    letter-spacing:2px;
}


/* Hero Section */

.hero{
    height:100vh;
    background:
    linear-gradient(rgba(0,0,0,.55), rgba(0,0,0,.55)),
    url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee");
    
    background-size:cover;
    background-position:center;
    
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}


.hero h1{
    font-size:75px;
    color:#FFD700;
    text-shadow:0 0 30px gold;
    animation:float 3s infinite;
}


.hero p{
    font-size:22px;
    margin-top:10px;
    letter-spacing:3px;
}


/* Gallery */

.section{
    padding:60px 25px;
}

.section h2{
    text-align:center;
    color:#FFD700;
    font-size:38px;
    margin-bottom:35px;
}


.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}


.gallery img{
    width:100%;
    height:320px;
    object-fit:cover;
    border-radius:15px;
    transition:.6s;
}


.gallery img:hover{
    transform:scale(1.08);
    box-shadow:0 0 30px gold;
}


/* About */

.about{
    text-align:center;
    font-size:20px;
    line-height:1.7;
    color:#ddd;
}


/* Footer */

footer{
    background:#111;
    text-align:center;
    padding:25px;
    color:#888;
}


/* Animation */

@keyframes glow{

from{
    text-shadow:0 0 10px gold;
}

to{
    text-shadow:0 0 35px orange;
}

}


@keyframes float{

50%{
    transform:translateY(-15px);
}

}


</style>

</head>


<body>


<nav>
<div class="logo">ZP</div>
<div class="name">Zaildaar Photographs</div>
</nav>


<section class="hero">

<div>

<h1>ZP</h1>

<p>
Capturing Emotions • Moments • Memories
</p>

</div>

</section>



<section class="section">

<h2>My Gallery</h2>


<div class="gallery">

<img src="https://images.unsplash.com/photo-1516035069371-29a1b244cc32">

<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">

<img src="https://images.unsplash.com/photo-1517841905240-472988babdf9">

<img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1">

<img src="https://images.unsplash.com/photo-1503023345310-bd7c1de61c7d">

<img src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4">

</div>

</section>



<section class="section">

<h2>About ZP</h2>

<p class="about">
Zaildaar Photographs transforms simple moments into timeless stories. Every click captures emotions, beauty, creativity and unforgettable memories.
</p>

</section>


<footer>
© 2026 ZP | Zaildaar Photographs
</footer>


</body>
</html>
