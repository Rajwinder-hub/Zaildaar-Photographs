<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZP Ultra Pro Studio</title>

<style>
:root{
  --bg:#0b0b0b;
  --card:#161616;
  --text:white;
  --accent:#00ffd5;
}

.light{
  --bg:#f5f5f5;
  --card:white;
  --text:black;
  --accent:#0077ff;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
  transition:0.3s;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:0;
  top:0;
  width:70px;
  height:100%;
  background:var(--card);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:20px;
  transition:0.3s;
}

.sidebar.open{
  width:180px;
}

.sidebar button{
  background:none;
  border:none;
  color:var(--text);
  margin:15px 0;
  cursor:pointer;
  font-size:14px;
}

/* TOPBAR */
.topbar{
  margin-left:70px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:var(--card);
  position:sticky;
  top:0;
  transition:0.3s;
}

.logo{
  color:var(--accent);
  font-weight:bold;
}

/* SEARCH */
input{
  padding:7px;
  border:none;
  outline:none;
  border-radius:5px;
  width:150px;
}

/* HERO */
.hero{
  margin-left:70px;
  height:50vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
  url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee") center/cover;
}

.hero h1{
  color:var(--accent);
  font-size:40px;
}

.btn{
  padding:10px 15px;
  background:var(--accent);
  border:none;
  color:black;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

/* FILTER */
.filters{
  margin-left:70px;
  text-align:center;
  padding:10px;
}

.filters button{
  margin:5px;
  padding:6px 10px;
  border:none;
  background:var(--card);
  color:var(--text);
  cursor:pointer;
  border-radius:5px;
}

.filters button:hover{
  background:var(--accent);
  color:black;
}

/* GALLERY */
.gallery{
  margin-left:70px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  position:relative;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.card img:hover{
  transform:scale(1.05);
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.lightbox img{
  max-width:90%;
  max-height:80%;
  border-radius:10px;
}

/* FOOTER */
footer{
  margin-left:70px;
  text-align:center;
  padding:15px;
  background:var(--card);
}

/* RESPONSIVE */
@media(max-width:600px){
  .sidebar{width:50px;}
  .topbar,.hero,.filters,.gallery,footer{margin-left:50px;}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<button onclick="toggleMenu()">☰</button>
<button onclick="toggleTheme()">🌓</button>
<button onclick="filter('all')">All</button>
<button onclick="filter('nature')">Nature</button>
<button onclick="filter('portrait')">Portrait</button>
</div>

<!-- TOP -->
<div class="topbar">
  <div class="logo">ZP Ultra Pro 📸</div>
  <input type="text" id="search" placeholder="Search..." onkeyup="searchPhotos()">
</div>

<!-- HERO -->
<div class="hero">
  <h1>Zaildaar Photographs</h1>
  <p>Professional Photography Studio</p>
  <button class="btn">Explore</button>
</div>

<!-- FILTER -->
<div class="filters">
  <button onclick="filter('all')">All</button>
  <button onclick="filter('nature')">Nature</button>
  <button onclick="filter('portrait')">Portrait</button>
</div>

<!-- GALLERY -->
<div class="gallery" id="gallery">

<div class="card nature">
<img src="https://source.unsplash.com/300x300/?nature" onclick="openImg(this)">
</div>

<div class="card portrait">
<img src="https://source.unsplash.com/300x300/?portrait" onclick="openImg(this)">
</div>

<div class="card nature">
<img src="https://source.unsplash.com/300x300/?mountain" onclick="openImg(this)">
</div>

<div class="card portrait">
<img src="https://source.unsplash.com/300x300/?model" onclick="openImg(this)">
</div>

<div class="card nature">
<img src="https://source.unsplash.com/300x300/?sunset" onclick="openImg(this)">
</div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeImg()">
<img id="lightboxImg">
</div>

<footer>
© 2026 ZP Ultra Pro Studio | Built with Advanced UI
</footer>

<script>

// MENU
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("open");
}

// THEME
function toggleTheme(){
  document.body.classList.toggle("light");
}

// FILTER
function filter(type){
  let cards = document.querySelectorAll(".card");
  cards.forEach(c=>{
    if(type==="all"){
      c.style.display="block";
    }else{
      c.style.display = c.classList.contains(type) ? "block" : "none";
    }
  });
}

// SEARCH
function searchPhotos(){
  let input = document.getElementById("search").value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(c=>{
    let match = c.innerHTML.toLowerCase().includes(input);
    c.style.display = match ? "block" : "none";
  });
}

// LIGHTBOX
function openImg(img){
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lightboxImg").src = img.src;
}

function closeImg(){
  document.getElementById("lightbox").style.display="none";
}

</script>

</body>
</html>
